name: dag-diamond-comp
steps:
  - { block: db.read,       version: "1.0.0", id: src }
  - { block: db.upsert,     version: "1.2.0", id: b, params: { table: target_rows }, wiring: { rows: "src.rows" } }
  - { block: transform.map, version: "1.0.0", id: c, wiring: { rows: "src.rows" } }
  - { block: merge,         version: "1.0.0", id: join, wiring: { left: "b.written", right: "c.rows" } }
  - { block: notify.email,  version: "1.0.0", id: sink, wiring: { rows: "join.out" } }
