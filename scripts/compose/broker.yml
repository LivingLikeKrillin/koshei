# koshei-local MQTT broker for the outbound governance-event gate (run-outbound-emit-gate.sh).
#
# WHY a koshei-local compose: the R2 NCMD gate reuses HiveMQ CE from the EXTERNAL
# sparkplug-governance-lab repo (run-r2-ncmd-gate.sh -> $LAB_DIR/docker-compose.yml). The outbound-emit
# gate's only external repo is the TWIN (resequence-twin-lab); pulling a *second* external repo just for a
# broker is avoided by shipping this small, self-contained broker compose. Keep a 2-repo gate (koshei + twin).
#
# BROKER CHOICE: HiveMQ CE is the portfolio-consistent default (Sparkplug B house broker, same image the
# R2 gate uses). Plain MQTT v3 + Sparkplug-payload passthrough is all this gate needs; `eclipse-mosquitto`
# is an acceptable drop-in substitute (uncomment below) if a lighter/faster broker is preferred — both
# expose plain MQTT on 1883 and neither inspects the Sparkplug protobuf.
#
# Brought up standalone by the gate:
#   docker compose -f "$(native_path scripts/compose/broker.yml)" up -d
# and torn down in the gate's trap:
#   docker compose -f "$(native_path scripts/compose/broker.yml)" down
services:
  hivemq-ce:
    image: hivemq/hivemq-ce:latest   # the tag cached locally in the gate environment
    container_name: koshei-emit-broker
    ports:
      - "1883:1883"                  # plain MQTT to the host; koshei API + twin both connect to tcp://localhost:1883

